<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
        }
        .hidden { display: none; }
        #authSection {
            max-width: 400px;
            margin: 0 auto;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tabs button {
            flex: 1;
            padding: 10px;
            cursor: pointer;
        }
        .tabs button.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            padding: 10px;
            font-size: 14px;
        }
        button[type="submit"], #logoutBtn {
            padding: 10px;
            cursor: pointer;
        }
        #authError {
            color: red;
            min-height: 20px;
        }
        #chatHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #messages {
            border: 1px solid #ccc;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
            margin: 16px 0;
        }
    </style>
</head>
<body>

<div id="authSection">
    <h1>Chat App</h1>
    <div class="tabs">
        <button type="button" id="loginTab" class="active">Login</button>
        <button type="button" id="signupTab">Sign Up</button>
    </div>
    <p id="authError"></p>

    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <form id="signupForm" class="hidden">
        <input type="text" id="signupUsername" placeholder="Username" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required minlength="6">
        <button type="submit">Sign Up</button>
    </form>
</div>

<div id="chatSection" class="hidden">
    <div id="chatHeader">
        <h1>Chatting as <span id="currentUsername"></span></h1>
        <button id="logoutBtn">Logout</button>
    </div>

    <h3>Online Users</h3>
    <ul id="usersList"></ul>

    <p id="typing"></p>

    <input id="message" placeholder="Enter message">
    <button id="sendBtn">Send</button>

    <br><br>

    <input id="roomInput" placeholder="Room name">
    <button id="joinRoomBtn">Join Room</button>

    <br><br>

    <input id="dmUserInput" placeholder="Username for DM">
    <button id="openDmBtn">Open DM</button>

    <br><br>

    <input id="dmInput" placeholder="DM message">
    <button id="dmBtn">Send DM</button>

    <div id="messages"></div>
    <p id="roomStatus">Global Chat</p>
    <button id="leaveRoomBtn">Back To Global Chat</button>
</div>

</body>
</html>
